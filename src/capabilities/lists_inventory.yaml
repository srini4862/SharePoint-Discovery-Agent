name: lists_inventory
description: Inventories SharePoint lists and libraries across the tenant to identify large lists (>5,000 items), custom templates, and versioning settings.
domain: sharepoint_discovery
required_inputs:
  - tenant_id
  - client_id
optional_inputs:
  - scope
authentication_methods:
  - delegated_interactive
  - app_only
scripts:
  - scripts/discovery/lists_inventory.ps1
produces_artifacts:
  - lists_inventory.json
dependencies:
  - PnP.PowerShell
execution_modes:
  - platform_managed
  - customer_managed
